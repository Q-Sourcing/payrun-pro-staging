name: PR CI

on:
  pull_request:
    branches:
      - develop
      - staging
      - main

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: ${{ github.base_ref == 'main' && 'production' || 'development' }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

