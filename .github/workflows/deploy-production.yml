# ==========================================================
# 🚀 Q-Payroll GitHub Actions Workflow for Production
# ==========================================================
# Note: Lovable auto-deploys based on branch pushes

name: Deploy Production
on:
  push:
    branches:
      - main

jobs:
  deploy:
    uses: ./.github/workflows/deploy-supabase-reusable.yml
    with:
      environment: production
      node_env: production
      npm_push_script: push:prod
      strict_validation: true
      supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN_PRODUCTION || secrets.SUPABASE_ACCESS_TOKEN }}
      supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_PRODUCTION || secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
