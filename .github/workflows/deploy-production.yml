name: Deploy Production
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_ENV: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

  deploy:
    needs: build
    uses: ./.github/workflows/deploy-supabase-reusable.yml
    with:
      environment: production
      node_env: production
      npm_push_script: push:prod
      strict_validation: true
      supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN_PRODUCTION || secrets.SUPABASE_ACCESS_TOKEN }}
