name: Deploy Staging
on:
  push:
    branches:
      - staging

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_ENV: development
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

  deploy:
    needs: build
    uses: ./.github/workflows/deploy-supabase-reusable.yml
    with:
      environment: staging
      node_env: development
      npm_push_script: push:staging
      strict_validation: false
      supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN_STAGING || secrets.SUPABASE_ACCESS_TOKEN }}
