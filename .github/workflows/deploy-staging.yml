# ==========================================================
# 🧩 Q-Payroll GitHub Actions Workflow for Staging
# ==========================================================
# Note: Lovable auto-deploys based on branch pushes

name: Deploy Staging
on:
  push:
    branches:
      - staging

jobs:
  deploy:
    uses: ./.github/workflows/deploy-supabase-reusable.yml
    with:
      environment: staging
      node_env: development
      npm_push_script: push:staging
      strict_validation: false
      supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN_STAGING || secrets.SUPABASE_ACCESS_TOKEN }}
      supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_STAGING || secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
